<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - else</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .loading-ring {
            width: 120px;
            height: 120px;
            position: relative;
        }
        
        .loading-ring .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
        }
        
        .loading-ring .circle:nth-child(1) {
            border-top-color: #4a6fa5;
            animation: rotate 1.5s linear infinite;
        }
        
        .loading-ring .circle:nth-child(2) {
            border-right-color: #6b8cce;
            animation: rotate 1.2s linear infinite reverse;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
        }
        
        .loading-ring .circle:nth-child(3) {
            border-bottom-color: #8aa8d8;
            animation: rotate 1s linear infinite;
            top: 20px;
            left: 20px;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 2px;
        }
        
        .progress-container {
            width: 300px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4a6fa5, #6b8cce, #8aa8d8);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
            width: 0%;
        }
        
        .percentage {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-top: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 0%;
            }
        }
        
        .back-button {
            position: fixed;
            bottom: 40px;
            display: inline-block;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .loading-dots {
            display: inline-block;
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4) infinite;
        }
        
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-ring">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        
        <div class="loading-text">
            正在加载<span class="loading-dots"></span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="percentage">0%</div>
    </div>
    
    <a href="introduction.html" class="back-button">← 返回</a>
    
    <script>
        const percentageElement = document.querySelector('.percentage');
        let percentage = 0;
        
        function updatePercentage() {
            percentage = Math.floor(Math.random() * 30) + percentage;
            if (percentage > 100) percentage = 100;
            percentageElement.textContent = percentage + '%';
            
            if (percentage < 100) {
                setTimeout(updatePercentage, Math.random() * 500 + 200);
            }
        }
        
        setTimeout(updatePercentage, 500);
    </script>
</body>
</html>
