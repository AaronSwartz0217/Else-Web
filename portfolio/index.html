<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 - else</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .header p {
            color: #888;
            font-size: 1.1rem;
        }
        
        /* ====== PPT 幻灯片展示区 ====== */
        .ppt-showcase {
            background: #2d2d2d;
            border-radius: 12px;
            border: 1px solid #404040;
            padding: 30px;
            margin-bottom: 60px;
        }
        
        .ppt-showcase h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4a6fa5;
            text-align: center;
        }
        
        .ppt-showcase .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        
        /* 轮播容器 */
        .carousel-wrap {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .carousel-viewport {
            overflow: hidden;
            border-radius: 8px;
            background: #1a1a1a;
            aspect-ratio: 16 / 9;
        }
        
        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            height: 100%;
        }
        
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        
        /* 左右箭头 */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(74, 111, 165, 0.8);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s ease;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .carousel-arrow:hover {
            background: rgba(74, 111, 165, 1);
        }
        
        .carousel-arrow.prev { left: -22px; }
        .carousel-arrow.next { right: -22px; }
        
        @media (max-width: 768px) {
            .carousel-arrow.prev { left: 10px; }
            .carousel-arrow.next { right: 10px; }
        }
        
        /* 底部指示器 */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .carousel-dot.active {
            background: #4a6fa5;
        }
        
        /* 页码 */
        .carousel-page {
            text-align: center;
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }
        
        /* ====== 其他作品网格 ====== */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #4a6fa5;
            padding-bottom: 10px;
            border-bottom: 1px solid #404040;
        }
        
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .work-card {
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #404040;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        .work-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #333;
        }
        
        .work-info {
            padding: 18px;
        }
        
        .work-info h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .work-info p {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .work-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .work-tag {
            padding: 3px 10px;
            background: #3a3a3a;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #888;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            position: relative;
            max-width: 1000px;
            max-height: 95vh;
            width: 100%;
            text-align: center;
        }
        
        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 6px;
        }
        
        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s ease;
            line-height: 1;
        }
        
        .lightbox-close:hover {
            color: #4a6fa5;
        }
        
        /* 底部导航 */
        .footer-nav {
            text-align: center;
            margin-top: 50px;
        }
        
        .back-link {
            display: inline-block;
            padding: 12px 24px;
            background: #4a6fa5;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        
        .back-link:hover {
            background: #3a5a85;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
        
        @media (max-width: 768px) {
            .ppt-showcase {
                padding: 15px;
            }
            .carousel-arrow {
                width: 36px;
                height: 36px;
            }
            .works-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>作品集</h1>
            <p>精选设计与开发项目展示</p>
        </div>
        
        <!-- PPT 幻灯片展示 -->
        <div class="ppt-showcase">
            <h2>Black & White Dark Experimental Photography Portfolio</h2>
            <p class="subtitle">PPT 演示文稿 · 点击幻灯片可全屏查看</p>
            
            <div class="carousel-wrap">
                <button class="carousel-arrow prev" onclick="moveCarousel(-1)">&#10094;</button>
                
                <div class="carousel-viewport" onclick="openLightbox(currentSlide)">
                    <div class="carousel-track" id="carouselTrack">
                        <div class="carousel-slide"><img src="slides/slide_1.png" alt="Slide 1"></div>
                        <div class="carousel-slide"><img src="slides/slide_2.png" alt="Slide 2"></div>
                        <div class="carousel-slide"><img src="slides/slide_3.png" alt="Slide 3"></div>
                        <div class="carousel-slide"><img src="slides/slide_4.png" alt="Slide 4"></div>
                        <div class="carousel-slide"><img src="slides/slide_5.png" alt="Slide 5"></div>
                        <div class="carousel-slide"><img src="slides/slide_6.png" alt="Slide 6"></div>
                        <div class="carousel-slide"><img src="slides/slide_7.png" alt="Slide 7"></div>
                        <div class="carousel-slide"><img src="slides/slide_8.png" alt="Slide 8"></div>
                    </div>
                </div>
                
                <button class="carousel-arrow next" onclick="moveCarousel(1)">&#10095;</button>
            </div>
            
            <div class="carousel-dots" id="carouselDots"></div>
            <div class="carousel-page" id="carouselPage">1 / 8</div>
        </div>
        
        <div class="footer-nav">
            <a href="../introduction.html" class="back-link">返回介绍页面</a>
        </div>
    </div>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
            <img src="" alt="" class="lightbox-img" id="lightboxImg">
        </div>
    </div>
    
    <script>
        // ====== 轮播逻辑 ======
        let currentSlide = 0;
        const totalSlides = 8;
        const track = document.getElementById('carouselTrack');
        const dotsContainer = document.getElementById('carouselDots');
        const pageIndicator = document.getElementById('carouselPage');
        
        // 初始化指示点
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        }
        
        function updateCarousel() {
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentSlide);
            });
            pageIndicator.textContent = `${currentSlide + 1} / ${totalSlides}`;
        }
        
        function moveCarousel(dir) {
            currentSlide = (currentSlide + dir + totalSlides) % totalSlides;
            updateCarousel();
        }
        
        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }
        
        // 自动播放（可选）
        let autoPlay = setInterval(() => moveCarousel(1), 5000);
        document.querySelector('.carousel-wrap').addEventListener('mouseenter', () => clearInterval(autoPlay));
        document.querySelector('.carousel-wrap').addEventListener('mouseleave', () => {
            autoPlay = setInterval(() => moveCarousel(1), 5000);
        });
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveCarousel(-1);
            if (e.key === 'ArrowRight') moveCarousel(1);
            if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')});
        });
        
        // ====== Lightbox 逻辑 ======
        function openLightbox(slideIndex, customSrc, customAlt) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            
            if (customSrc) {
                img.src = customSrc;
                img.alt = customAlt || '';
            } else {
                const slideImg = document.querySelectorAll('.carousel-slide img')[slideIndex];
                img.src = slideImg.src;
                img.alt = slideImg.alt;
            }
            
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox(event) {
            if (event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        }
    </script>
</body>
</html>
